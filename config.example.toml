# modelrouter — example configuration
# Copy to ~/.modelrouter/config.toml and edit as needed.

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------
[server]
# Address to bind. Use 0.0.0.0 to accept connections from all interfaces.
host = "127.0.0.1"
port = 8080
# Maximum request body size in megabytes.
request_body_limit_mb = 10

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
[database]
# Path to the SQLite database file. ~ is expanded automatically.
path = "~/.modelrouter/router.db"
# Uncomment to use PostgreSQL instead of SQLite (requires --features postgres).
# postgres_url = "postgres://user:pass@localhost:5432/modelrouter"

# ---------------------------------------------------------------------------
# Routing
# ---------------------------------------------------------------------------
[routing]
# Provider used when no prefix is present in the model name.
default_provider = "openai"
# Model used when the client does not specify one.
default_model = "gpt-4o"

# Aliases map a short name → full provider/model string.
[routing.model_aliases]
"fast"    = "openai/gpt-4o-mini"
"smart"   = "anthropic/claude-opus-4-5"
"local"   = "ollama/llama3"

# Fallback chains: if a provider fails, try the next one.
[routing.fallback_chains]
"openai/gpt-4o" = ["anthropic/claude-opus-4-5", "ollama/llama3"]

# ---------------------------------------------------------------------------
# Providers
# ---------------------------------------------------------------------------
[providers.openai]
api_key  = ""          # or set MODELROUTER__PROVIDERS__OPENAI__API_KEY
# api_base = "https://api.openai.com/v1"
timeout_secs = 60

[providers.anthropic]
api_key  = ""          # or set MODELROUTER__PROVIDERS__ANTHROPIC__API_KEY
# api_base = "https://api.anthropic.com"
timeout_secs = 60

[providers.gemini]
api_key  = ""          # or set MODELROUTER__PROVIDERS__GEMINI__API_KEY
# api_base = "https://generativelanguage.googleapis.com/v1beta/openai"
timeout_secs = 60

[providers.ollama]
api_key  = "ollama"    # Ollama doesn't require a real key
api_base = "http://localhost:11434/v1"
timeout_secs = 120

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
[auth]
# Secret used to sign JWT tokens for key rotation. Change before deploying!
jwt_secret            = "change-me-jwt-secret"
# How long a JWT token is valid (minutes).
jwt_expiry_mins       = 60
# Grace period during key rotation where both old and new keys are accepted.
rotation_overlap_mins = 15

# ---------------------------------------------------------------------------
# Hooks — lifecycle
# Lifecycle hooks run at server startup/shutdown.
# ---------------------------------------------------------------------------
[[hooks.lifecycle]]
name        = "notify-start"
event       = "server.start"
exec        = "/usr/local/bin/my-notify.sh"
timeout_secs = 5

# ---------------------------------------------------------------------------
# Hooks — pipeline
# Pipeline hooks intercept every request/response.
# ---------------------------------------------------------------------------
[[hooks.pipeline]]
name         = "pii-scrubber"
event        = "request.pre"
exec         = "/usr/local/bin/pii-scrub"
capabilities = ["mutate_request"]
timeout_secs = 3
fail_open    = false   # If true, proxy continues even if the hook fails.

[[hooks.pipeline]]
name         = "usage-logger"
event        = "response.post"
exec         = "/usr/local/bin/log-usage"
capabilities = []
timeout_secs = 2
fail_open    = true

# ── Telemetry (requires --features otel) ──────────────────────────────
# [telemetry]
# enabled = false
# endpoint = "http://localhost:4317"   # OTLP gRPC endpoint (collector)
# service_name = "modelrouter"
# sample_ratio = 0.1                   # 0.0–1.0 fraction of normal requests to trace
# slow_threshold_ms = 2000             # always export spans slower than this
# batch_queue_size = 2048
# batch_scheduled_delay_ms = 5000
# batch_max_export_size = 512

# ── Pricing overrides ────────────────────────────────────────────────────
# Override per-model pricing (dollars per million tokens).
# Any model not listed here falls back to built-in defaults.
#
# [[pricing]]
# model = "gpt-4o"
# input_per_million = 2.50
# output_per_million = 10.0
#
# [[pricing]]
# model = "my-private-llama"
# input_per_million = 0.10
# output_per_million = 0.30

# ---------------------------------------------------------------------------
# Declarative Policy Rules
# ---------------------------------------------------------------------------
# Rules are evaluated before database budget rules. The highest-priority
# matching rule wins. If no rule matches, database rules apply (backward compat).
#
# NOTE: Use [[policy_rules]] (not [[policy.rules]]) — flat top-level array.
#
# Condition fields (all optional — omit to match everyone):
#   tag        = user's API key tag
#   group_name = user's group
#   user_id    = specific user ID
#   model      = exact requested model string
#
# All condition fields provided must match (AND logic).
#
# [[policy_rules]]
# name         = "research-team-opus"
# priority     = 10
# allow_models = ["claude-opus-4-5"]
# budget_usd   = 200.0
# window       = "monthly"         # "daily", "weekly", or "monthly"
# [policy_rules.condition]
# tag = "research"
#
# [[policy_rules]]
# name     = "intern-budget"
# priority = 5
# budget_usd = 10.0
# window   = "monthly"
# [policy_rules.condition]
# group_name = "interns"
#
# [[policy_rules]]
# name     = "global-floor"
# priority = 0
# budget_usd = 50.0
# window   = "monthly"
# # No condition — matches all users (catch-all / default policy)

# ── SSO / OIDC (optional) ─────────────────────────────────────────────────────
# Enable OpenID Connect SSO for admin login.
# When enabled, admins can authenticate at /admin/auth/oidc/login instead of
# (or in addition to) the username/password form.
#
# Tested with: Google, GitHub (using GHES OIDC), Okta, Auth0, Keycloak.
#
# [oidc]
# enabled = false
#
# # OIDC issuer URL — discovery document fetched from {issuer_url}/.well-known/openid-configuration
# issuer_url = "https://accounts.google.com"
#
# # OAuth2 client credentials (create in your IdP console)
# client_id = "your-client-id.apps.googleusercontent.com"
# client_secret = "your-client-secret"
#
# # Redirect URI — must match exactly what you registered in the IdP console
# redirect_uri = "https://your-modelrouter.example.com/admin/auth/oidc/callback"
#
# # Optional: restrict login to specific email addresses
# allowed_emails = ["alice@example.com", "bob@example.com"]
#
# # Optional: restrict login to email domains (checked if email not in allowed_emails)
# allowed_domains = ["example.com", "corp.example.com"]
#
# # Role assigned to auto-provisioned admins (default: "admin"; use "superadmin" for full access)
# auto_provision_role = "admin"
