{% extends "base.html" %}
{% block title %}Keys — modelrouter Admin{% endblock %}
{% block content %}
<h1>Keys</h1>

<datalist id="user-list">
    {% for name in user_names %}<option value="{{ name }}">{% endfor %}
</datalist>
<datalist id="project-list">
    {% for p in projects %}<option value="{{ p }}">{% endfor %}
</datalist>

<form hx-post="/admin/keys" hx-target="#key-form-message" hx-swap="innerHTML" hx-on::after-request="this.reset()" style="display:flex;gap:0.5rem;align-items:flex-end;margin-bottom:1rem;">
    <div>
        <label style="display:block;font-size:0.85rem;margin-bottom:0.25rem;">User *</label>
        <input type="text" name="user_name" required list="user-list" placeholder="alice" style="padding:0.4rem 0.6rem;border:1px solid #ccc;border-radius:4px;">
    </div>
    <div>
        <label style="display:block;font-size:0.85rem;margin-bottom:0.25rem;">Project</label>
        <input type="text" name="project" list="project-list" placeholder="my-project" style="padding:0.4rem 0.6rem;border:1px solid #ccc;border-radius:4px;">
    </div>
    <div>
        <label style="display:block;font-size:0.85rem;margin-bottom:0.25rem;">Label</label>
        <input type="text" name="label" placeholder="laptop" style="padding:0.4rem 0.6rem;border:1px solid #ccc;border-radius:4px;">
    </div>
    <div>
        <label style="display:block;font-size:0.85rem;margin-bottom:0.25rem;">Email</label>
        <input type="email" name="email" placeholder="user@example.com" style="padding:0.4rem 0.6rem;border:1px solid #ccc;border-radius:4px;">
    </div>
    <button type="submit" class="btn btn-success">Create Key</button>
</form>
<div id="key-form-message" style="margin-bottom:1rem;"></div>

<style>
@keyframes rowFlash { 0%,100%{background:transparent} 50%{background:#fff3cd} }
.row-highlight { animation: rowFlash 0.6s ease 3; }
</style>

<script>
function toggleGroup(gid) {
    var rows = document.querySelectorAll('.sub-' + gid);
    var btn = document.getElementById('toggle-' + gid);
    var show = rows.length > 0 && rows[0].style.display === 'none';
    rows.forEach(function(r) { r.style.display = show ? 'table-row' : 'none'; });
    if (btn) {
        var count = btn.dataset.count;
        btn.textContent = (show ? '▼ ' : '▶ ') + count + ' old key' + (count == 1 ? '' : 's');
    }
}
</script>

<table id="keys-table">
    <thead>
        <tr>
            <th>User</th>
            <th>Project</th>
            <th>Label</th>
            <th>Status</th>
            <th>Created</th>
            <th>Disabled</th>
            <th>Actions</th>
        </tr>
    </thead>
    {{ groups_html | safe }}
</table>
{% endblock %}
