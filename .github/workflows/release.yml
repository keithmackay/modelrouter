name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-13
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5

      - name: Build (native)
        if: '!matrix.use_cross'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/modelrouter modelrouter-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: modelrouter-${{ matrix.target }}
          path: modelrouter-${{ matrix.target }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          find artifacts -type f | xargs ls -la

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/modelrouter-x86_64-unknown-linux-gnu/modelrouter-x86_64-unknown-linux-gnu
            artifacts/modelrouter-aarch64-unknown-linux-gnu/modelrouter-aarch64-unknown-linux-gnu
            artifacts/modelrouter-aarch64-apple-darwin/modelrouter-aarch64-apple-darwin
            artifacts/modelrouter-x86_64-apple-darwin/modelrouter-x86_64-apple-darwin
          generate_release_notes: true

  docker:
    name: Docker (${{ matrix.variant }})
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ github.repository }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            features: ""
            tag_suffix: ""
          - variant: otel
            features: "otel"
            tag_suffix: "-otel"
          - variant: postgres
            features: "postgres"
            tag_suffix: "-postgres"
          - variant: full
            features: "otel,postgres,bedrock,prometheus"
            tag_suffix: "-full"
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: FEATURES=${{ matrix.features }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}${{ matrix.tag_suffix }}
            ${{ !contains(github.ref_name, '-') && format('ghcr.io/{0}:latest{1}', env.IMAGE_NAME, matrix.tag_suffix) || '' }}
