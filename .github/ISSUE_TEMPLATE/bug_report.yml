name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out as much as possible. Redact any API keys or secrets before submitting.

  - type: input
    id: version
    attributes:
      label: modelrouter version
      description: Output of `modelrouter --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14, Ubuntu 22.04, …"
    validations:
      required: true

  - type: dropdown
    id: features
    attributes:
      label: Build features
      options:
        - Default (SQLite only)
        - "--features postgres"
        - "--features otel"
        - "--features postgres,otel"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal config, request, or command that triggers the bug.
      placeholder: |
        1. Config: [telemetry] enabled = true, endpoint = "..."
        2. Run: modelrouter serve
        3. Send: curl ...
        4. See: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Set RUST_LOG=modelrouter=debug for verbose output.
      render: text
