# OpenTelemetry Collector config for local modelrouter development
#
# Receives OTLP from modelrouter, exports to:
#   - Jaeger  (traces)
#   - Prometheus scrape endpoint (metrics)
#   - stdout  (logs — visible via docker logs otel-collector)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  otlp/jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: modelrouter

  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [otlp/jaeger, debug]

    metrics:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [prometheus, debug]

    logs:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [debug]
