apiVersion: v1
kind: Secret
metadata:
  name: {{ include "modelrouter.fullname" . }}-secrets
  labels:
    {{- include "modelrouter.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  {{- range $provider, $key := .Values.secrets.providers }}
  provider-{{ $provider }}: {{ $key | quote }}
  {{- end }}
