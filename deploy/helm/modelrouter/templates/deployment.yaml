apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "modelrouter.fullname" . }}
  labels:
    {{- include "modelrouter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "modelrouter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "modelrouter.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when config changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/modelrouter", "migrate"]
          env:
            - name: MODELROUTER_CONFIG
              value: /config/config.toml
            - name: MODELROUTER__DATABASE__PATH
              value: /data/router.db
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
      containers:
        - name: modelrouter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MODELROUTER_CONFIG
              value: /config/config.toml
            - name: MODELROUTER__DATABASE__PATH
              value: /data/router.db
            - name: MODELROUTER__AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "modelrouter.fullname" . }}-secrets
                  key: jwt-secret
            {{- range $provider, $_ := .Values.secrets.providers }}
            - name: MODELROUTER__PROVIDERS__{{ $provider | upper }}__API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "modelrouter.fullname" $ }}-secrets
                  key: provider-{{ $provider }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "modelrouter.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "modelrouter.fullname" . }}-data
        {{- end }}
